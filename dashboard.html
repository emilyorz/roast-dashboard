<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RoastTime Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #0d0b08;
        --panel: #161209;
        --panel-soft: #1c1710;
        --panel-deep: #0a0805;
        --line: #2c2318;
        --text: #f2ebe0;
        --muted: #9a8c7a;
        --accent: #c97f32;
        --accent2: #6d9e96;
        --accent3: #b85540;
        --font-display: "Playfair Display", Georgia, serif;
        --font-body: "Barlow", system-ui, sans-serif;
        --font-mono: "JetBrains Mono", "IBM Plex Mono", monospace;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          radial-gradient(ellipse at 5% 0%, rgba(200, 127, 50, 0.14) 0%, transparent 45%),
          radial-gradient(ellipse at 95% 85%, rgba(184, 85, 64, 0.09) 0%, transparent 40%),
          var(--bg);
        color: var(--text);
        font-family: var(--font-body);
        line-height: 1.5;
      }

      .wrap {
        max-width: 1400px;
        margin: 0 auto;
        padding: 28px 24px;
      }

      header {
        margin-bottom: 28px;
      }

      .title {
        margin: 0 0 6px;
        font-family: var(--font-display);
        font-size: 38px;
        font-weight: 900;
        letter-spacing: -0.01em;
        line-height: 1.1;
        color: var(--text);
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        font-weight: 300;
        letter-spacing: 0.01em;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 14px;
      }

      .panel {
        background: linear-gradient(160deg, var(--panel) 0%, var(--panel-soft) 100%);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 20px 24px;
        min-height: 220px;
        box-shadow:
          0 6px 32px rgba(0, 0, 0, 0.6),
          0 1px 4px rgba(0, 0, 0, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }

      .panel h2 {
        margin: 0 0 16px;
        font-family: var(--font-body);
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
      }

      .panel.kpi {
        grid-column: span 12;
        min-height: auto;
      }

      .panel.span-6 {
        grid-column: span 6;
      }

      .panel.span-4 {
        grid-column: span 4;
      }

      .panel.span-12 {
        grid-column: span 12;
      }

      /* ── KPI strip ─────────────────────────────────── */

      .kpi-strip {
        display: flex;
        align-items: center;
        gap: 0;
        min-height: 100px;
      }

      .kpi-hero {
        padding-right: 40px;
        border-right: 1px solid var(--line);
        flex-shrink: 0;
      }

      .kpi-hero-num {
        font-family: var(--font-mono);
        font-size: 72px;
        font-weight: 700;
        color: var(--text);
        line-height: 1;
        letter-spacing: -0.04em;
      }

      .kpi-hero-label {
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-top: 10px;
      }

      .kpi-hero-range {
        font-size: 11px;
        font-weight: 300;
        color: var(--muted);
        margin-top: 3px;
        opacity: 0.75;
      }

      .kpi-secondary {
        display: flex;
        align-items: center;
        flex: 1;
        padding-left: 40px;
      }

      .kpi-stat {
        flex: 1;
        padding: 0 32px 0 0;
      }

      .kpi-stat:not(:first-child) {
        padding-left: 32px;
        border-left: 1px solid var(--line);
      }

      .kpi-stat-num {
        font-family: var(--font-mono);
        font-size: 40px;
        font-weight: 700;
        color: var(--text);
        line-height: 1;
        letter-spacing: -0.03em;
      }

      .kpi-stat-label {
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-top: 8px;
      }

      /* ── Charts ────────────────────────────────────── */

      .chart-box {
        height: 280px;
      }

      /* ── Action meta ───────────────────────────────── */

      .action-meta {
        margin-top: 12px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
        font-size: 12px;
        font-weight: 400;
        color: var(--muted);
      }

      /* ── Sequence ──────────────────────────────────── */

      .sequence {
        margin-top: 12px;
        border-top: 1px solid var(--line);
        padding-top: 12px;
      }

      .seq-header {
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .seq-rows {
        display: flex;
        flex-direction: column;
        gap: 3px;
        list-style: none;
        margin: 0;
        padding: 0;
      }

      .seq-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 5px 8px;
        background: rgba(255, 255, 255, 0.015);
        border-radius: 3px;
        border: 1px solid rgba(255, 255, 255, 0.03);
        font-size: 12px;
        font-weight: 400;
      }

      .seq-num {
        width: 20px;
        text-align: center;
        color: #6a7480;
        font-size: 11px;
        flex-shrink: 0;
        font-family: var(--font-mono);
      }

      .seq-badge {
        width: 26px;
        height: 20px;
        line-height: 20px;
        text-align: center;
        border-radius: 3px;
        font-weight: 700;
        font-size: 11px;
        flex-shrink: 0;
        font-family: var(--font-mono);
      }

      .seq-F { background: rgba(109, 158, 150, 0.2); color: #6d9e96; }
      .seq-P { background: rgba(201, 127, 50, 0.2); color: #c97f32; }
      .seq-D { background: rgba(184, 85, 64, 0.2); color: #b85540; }

      .seq-value {
        color: var(--text);
        flex: 1;
        font-weight: 400;
      }

      .seq-timing {
        color: var(--accent);
        font-size: 11px;
        flex-shrink: 0;
        font-family: var(--font-mono);
      }

      .seq-samples {
        color: var(--muted);
        font-size: 10px;
        flex-shrink: 0;
        font-family: var(--font-mono);
        opacity: 0.6;
      }

      /* ── Responsive ────────────────────────────────── */

      @media (max-width: 980px) {
        .panel.span-6,
        .panel.span-4 {
          grid-column: span 12;
        }

        .kpi-strip {
          flex-direction: column;
          align-items: flex-start;
          gap: 20px;
        }

        .kpi-hero {
          padding-right: 0;
          border-right: none;
          border-bottom: 1px solid var(--line);
          padding-bottom: 20px;
          width: 100%;
        }

        .kpi-secondary {
          padding-left: 0;
          flex-wrap: wrap;
          gap: 16px;
        }

        .kpi-stat {
          flex: 0 0 calc(50% - 8px);
        }

        .kpi-stat:not(:first-child) {
          padding-left: 0;
          border-left: none;
        }

        .kpi-hero-num {
          font-size: 56px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <header>
        <h1 class="title">RoastTime Dashboard</h1>
        <p class="subtitle" id="subtitle">Loading...</p>
      </header>

      <div class="grid">
        <section class="panel kpi">
          <div class="kpi-strip">
            <div class="kpi-hero">
              <div class="kpi-hero-num" id="kpi-total">-</div>
              <div class="kpi-hero-label">烘豆總次數</div>
              <div class="kpi-hero-range" id="kpi-range">-</div>
            </div>
            <div class="kpi-secondary">
              <div class="kpi-stat">
                <div class="kpi-stat-num" id="kpi-month">-</div>
                <div class="kpi-stat-label">本月烘豆</div>
              </div>
              <div class="kpi-stat">
                <div class="kpi-stat-num" id="kpi-week">-</div>
                <div class="kpi-stat-label">本週烘豆</div>
              </div>
              <div class="kpi-stat">
                <div class="kpi-stat-num" id="kpi-avg">-</div>
                <div class="kpi-stat-label">平均烘焙時間</div>
              </div>
            </div>
          </div>
        </section>

        <section class="panel span-6">
          <h2>月度趨勢</h2>
          <div class="chart-box"><canvas id="monthlyChart" role="img" aria-label="月度烘豆次數趨勢折線圖"></canvas></div>
        </section>

        <section class="panel span-6">
          <h2>烘焙時間分布</h2>
          <div class="chart-box"><canvas id="timeChart" role="img" aria-label="烘焙時間分布直方圖"></canvas></div>
        </section>

        <section class="panel span-6">
          <h2>入豆 / 出豆溫度分布</h2>
          <div class="chart-box"><canvas id="tempChart" role="img" aria-label="入豆與出豆溫度分布直方圖"></canvas></div>
        </section>

        <section class="panel span-6">
          <h2>豆量分布</h2>
          <div class="chart-box"><canvas id="weightChart" role="img" aria-label="豆量分布直方圖"></canvas></div>
        </section>

        <section class="panel span-12">
          <h2>烘焙度分布</h2>
          <div style="display:flex;gap:12px;height:280px;">
            <div style="flex:1;min-width:0;"><canvas id="roastLevelDonut" role="img" aria-label="烘焙度分布圓餅圖"></canvas></div>
            <div style="flex:2;min-width:0;"><canvas id="roastLevelBar" role="img" aria-label="烘焙度月度堆疊長條圖"></canvas></div>
          </div>
        </section>

        <section class="panel span-12">
          <h2>操作行為</h2>
          <div class="chart-box"><canvas id="actionChart" role="img" aria-label="Fan / Power / Drum 操作次數長條圖"></canvas></div>
          <div class="action-meta" id="actionMeta"></div>
          <div class="sequence" id="sequence"></div>
        </section>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./data.js"></script>
    <script>
      const data = ROAST_DATA;

      // disable animations for users who prefer reduced motion
      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
        Chart.defaults.animation = false;
      }

      const WARM_TICK   = "#8a7c6c";
      const WARM_GRID   = "rgba(240,228,210,0.04)";
      const WARM_LEGEND = "#c8bfb0";

      const commonOptions = {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            labels: {
              color: WARM_LEGEND,
              font: { family: "'Barlow', sans-serif", size: 12 },
            },
          },
          tooltip: {
            backgroundColor: "rgba(10, 8, 5, 0.96)",
            borderColor: "#2c2318",
            borderWidth: 1,
            titleColor: "#f2ebe0",
            bodyColor: "#9a8c7a",
            padding: 10,
            cornerRadius: 4,
            titleFont: { family: "'Barlow', sans-serif", size: 13, weight: "600" },
            bodyFont:  { family: "'Barlow', sans-serif", size: 12 },
          },
        },
        scales: {
          x: {
            ticks: { color: WARM_TICK, maxRotation: 80, minRotation: 40, font: { family: "'Barlow', sans-serif", size: 11 } },
            grid: { color: WARM_GRID },
          },
          y: {
            ticks: { color: WARM_TICK, font: { family: "'Barlow', sans-serif", size: 11 } },
            grid: { color: WARM_GRID },
          },
        },
      };

      function movingAvg(arr, n) {
        return arr.map((_, i) => {
          if (i < n - 1) return null;
          const slice = arr.slice(i - n + 1, i + 1);
          return Math.round(slice.reduce((a, b) => a + b, 0) / n * 10) / 10;
        });
      }

      document.title = `RoastTime Dashboard — ${data.meta.startDate} ~ ${data.meta.endDate}`;
      document.getElementById("subtitle").textContent =
        `資料範圍 ${data.meta.startDate} ~ ${data.meta.endDate} | 產生時間 ${data.meta.generatedAt}`;

      document.getElementById("kpi-total").textContent = data.kpis.totalRoasts;
      document.getElementById("kpi-month").textContent = data.kpis.thisMonth;
      document.getElementById("kpi-week").textContent  = data.kpis.thisWeek;
      document.getElementById("kpi-avg").textContent   = data.kpis.avgRoastTimeLabel;
      document.getElementById("kpi-range").textContent = data.kpis.dateRange;

      new Chart(document.getElementById("monthlyChart"), {
        type: "line",
        data: {
          labels: data.monthlyTrend.labels,
          datasets: [
            {
              label: "Roasts / Month",
              data: data.monthlyTrend.counts,
              borderColor: "#c97f32",
              backgroundColor: "rgba(201,127,50,0.12)",
              borderWidth: 2,
              tension: 0.2,
              pointRadius: 3,
              pointBackgroundColor: "#c97f32",
              fill: true,
            },
            {
              label: "3M 均線",
              data: movingAvg(data.monthlyTrend.counts, 3),
              borderColor: "rgba(109,158,150,0.6)",
              backgroundColor: "transparent",
              borderWidth: 1.5,
              borderDash: [5, 4],
              tension: 0.3,
              pointRadius: 0,
              fill: false,
            },
          ],
        },
        options: {
          ...commonOptions,
          scales: {
            ...commonOptions.scales,
            x: {
              ...commonOptions.scales.x,
              ticks: {
                ...commonOptions.scales.x.ticks,
                callback: function(val, idx) {
                  return idx % 3 === 0 ? this.getLabelForValue(val) : "";
                },
              },
            },
          },
        },
      });

      new Chart(document.getElementById("timeChart"), {
        type: "bar",
        data: {
          labels: data.roastTimeHistogram.labels,
          datasets: [
            {
              label: "次數",
              data: data.roastTimeHistogram.counts,
              backgroundColor: "rgba(109,158,150,0.72)",
              borderColor: "#6d9e96",
              borderWidth: 1,
            },
          ],
        },
        options: {
          ...commonOptions,
          scales: {
            ...commonOptions.scales,
            x: {
              ...commonOptions.scales.x,
              ticks: {
                color: WARM_TICK,
                maxRotation: 45,
                minRotation: 45,
                font: { family: "'Barlow', sans-serif", size: 11 },
                callback: function(val, idx) {
                  return idx % 3 === 0 ? this.getLabelForValue(val) : "";
                },
              },
            },
          },
        },
      });

      new Chart(document.getElementById("tempChart"), {
        type: "bar",
        data: {
          labels: data.temperatureHistogram.labels,
          datasets: [
            {
              label: "Charge Temp",
              data: data.temperatureHistogram.chargeCounts,
              backgroundColor: "rgba(201,127,50,0.75)",
            },
            {
              label: "Drop Temp",
              data: data.temperatureHistogram.dropCounts,
              backgroundColor: "rgba(184,85,64,0.75)",
            },
          ],
        },
        options: commonOptions,
      });

      new Chart(document.getElementById("weightChart"), {
        type: "bar",
        data: {
          labels: data.weightHistogram.labels,
          datasets: [
            {
              label: `Recorded (${data.weightHistogram.recordedCount})`,
              data: data.weightHistogram.counts,
              backgroundColor: "rgba(109,158,80,0.72)",
            },
          ],
        },
        options: commonOptions,
      });

      new Chart(document.getElementById("actionChart"), {
        type: "bar",
        data: {
          labels: ["F", "P", "D"],
          datasets: [
            {
              label: "操作次數",
              data: [
                data.actionBehavior.countByType.F,
                data.actionBehavior.countByType.P,
                data.actionBehavior.countByType.D,
              ],
              backgroundColor: ["#6d9e96", "#c97f32", "#b85540"],
            },
          ],
        },
        options: commonOptions,
      });

      const avgPct = data.actionBehavior.avgPercentByType;
      document.getElementById("actionMeta").innerHTML =
        `<div>F 平均觸發時間: ${avgPct.F ?? "-"}%</div>` +
        `<div>P 平均觸發時間: ${avgPct.P ?? "-"}%</div>` +
        `<div>D 平均觸發時間: ${avgPct.D ?? "-"}%</div>` +
        `<div>未記錄豆量: ${data.weightHistogram.missingCount} 筆</div>`;

      const RL_DEFS = [
        { key: "Light",      label: "淺烘 Light",          color: "#f5d87a" },
        { key: "Medium",     label: "中烘 Medium",          color: "#c97f32" },
        { key: "MediumDark", label: "中深烘 Medium-Dark",   color: "#9b5e2a" },
        { key: "Dark",       label: "深烘 Dark",            color: "#4a2010" },
        { key: "Unknown",    label: "未知",                 color: "#555"    },
      ];
      const rlCounts = data.roastLevel.counts;

      const rlDonutDefs = RL_DEFS.filter((d) => rlCounts[d.key] > 0);

      new Chart(document.getElementById("roastLevelDonut"), {
        type: "doughnut",
        data: {
          labels: rlDonutDefs.map((d) => d.label),
          datasets: [
            {
              data: rlDonutDefs.map((d) => rlCounts[d.key]),
              backgroundColor: rlDonutDefs.map((d) => d.color),
              borderColor: "#161209",
              borderWidth: 2,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              labels: {
                color: WARM_LEGEND,
                font: { family: "'Barlow', sans-serif", size: 11 },
              },
            },
            tooltip: commonOptions.plugins.tooltip,
          },
        },
      });

      const rlByMonth = data.roastLevel.roastLevelByMonth;
      const rlBarOptions = {
        ...commonOptions,
        scales: {
          ...commonOptions.scales,
          x: {
            ...commonOptions.scales.x,
            stacked: true,
            ticks: {
              ...commonOptions.scales.x.ticks,
              callback: function(val, idx) {
                return idx % 3 === 0 ? this.getLabelForValue(val) : "";
              },
            },
          },
          y: { ...commonOptions.scales.y, stacked: true },
        },
      };

      new Chart(document.getElementById("roastLevelBar"), {
        type: "bar",
        data: {
          labels: rlByMonth.labels,
          datasets: RL_DEFS
            .filter((d) => rlCounts[d.key] > 0)
            .map((d) => ({
              label: d.label,
              data: rlByMonth[d.key],
              backgroundColor: d.color,
              stack: "roastLevel",
            })),
        },
        options: rlBarOptions,
      });

      const seqRows = data.actionBehavior.averageSequence.map((s) => {
        const pct = s.avgPercent == null ? "-" : `${s.avgPercent}%`;
        const value = s.avgValue == null ? "-" : s.avgValue;
        const typeLabel = { F: "Fan", P: "Power", D: "Drum" }[s.name] || s.name || "?";
        return `<li class="seq-row">
          <span class="seq-num">${s.step}</span>
          <span class="seq-badge seq-${s.name || "?"}">${s.name || "?"}</span>
          <span class="seq-value">${typeLabel} → ${value}</span>
          <span class="seq-timing">@ ${pct}</span>
          <span class="seq-samples">n=${s.sampleSize}</span>
        </li>`;
      }).join("");
      document.getElementById("sequence").innerHTML =
        `<div class="seq-header">平均一次烘焙的操作序列（前 8 步）</div><ol class="seq-rows" aria-label="操作序列">${seqRows}</ol>`;
    </script>
  </body>
</html>
